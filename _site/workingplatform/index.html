<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动量工作空间</title>
    <link rel="icon" href="./头像.jpg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="工作区导航">
        <div class="brand">
          <img class="brand-mark" src="./头像.jpg" alt="" />
          <div>
            <h1>动量工作空间</h1>
          </div>
        </div>

        <nav class="space-list" id="spaceList"></nav>

        <section class="cloud-note cloud-sync">
          <div class="cloud-sync-head">
            <span class="note-label">云端同步</span>
            <button class="icon-button cloud-logout-button" id="cloudLogoutBtn" type="button" title="退出登录" aria-label="退出登录" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 5H6.5A1.5 1.5 0 0 0 5 6.5v11A1.5 1.5 0 0 0 6.5 19H9" />
                <path d="M13 8l4 4-4 4" />
                <path d="M17 12H9" />
              </svg>
            </button>
          </div>
          <p id="cloudStatus">未登录，当前仅保存在本地。</p>
          <input id="cloudEmail" type="email" placeholder="填写邮箱" autocomplete="email" />
          <input id="cloudPassword" type="password" placeholder="填写密码" autocomplete="current-password" />
          <div class="cloud-actions cloud-account-actions">
            <button class="primary-button" id="cloudLoginBtn" type="button">登录</button>
            <button class="ghost-button" id="cloudRegisterBtn" type="button">注册</button>
            <button class="primary-button" id="cloudSetPasswordBtn" type="button" hidden>设置密码</button>
          </div>
          <div class="cloud-actions cloud-transfer-actions">
            <button class="ghost-button" id="uploadCloudBtn" type="button" disabled>上传本地</button>
            <button class="ghost-button" id="pullCloudBtn" type="button" disabled>拉取云端</button>
          </div>
        </section>
        <button class="ghost-button export-button" id="userCenterBtn" type="button">用户中心</button>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="spaceEyebrow">总览</p>
            <h2 id="spaceTitle">工作总览</h2>
          </div>
          <div class="topbar-actions">
            <article class="time-widget" id="timeWidget" aria-live="polite">
              <span class="clock-face" aria-hidden="true">
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-tick"></span>
                <span class="clock-hand hour-hand"></span>
                <span class="clock-hand minute-hand"></span>
              </span>
              <div class="time-copy">
                <span id="timeDate">日期</span>
                <strong id="timeNow">--:--</strong>
                <small id="timeWeek">星期</small>
              </div>
            </article>
            <article class="weather-widget" id="weatherWidget" aria-live="polite">
              <span class="weather-symbol" aria-hidden="true"></span>
              <div class="weather-copy">
                <span id="weatherCity">天气</span>
                <strong id="weatherTemp">--℃</strong>
                <small id="weatherDetail">正在获取天气</small>
              </div>
              <button class="icon-button weather-refresh" id="weatherRefreshBtn" type="button" title="刷新天气">↻</button>
            </article>
          </div>
        </header>

        <section class="overview-grid" id="overviewGrid" aria-label="工作概览">
          <article class="metric">
            <span id="metricOneLabel">项目</span>
            <strong id="projectCount">0</strong>
          </article>
          <article class="metric">
            <span>进行中</span>
            <strong id="doingCount">0</strong>
          </article>
          <article class="metric">
            <span>本周节点</span>
            <strong id="weekCount">0</strong>
          </article>
          <article class="metric">
            <span id="metricFourLabel">书签</span>
            <strong id="bookmarkCount">0</strong>
          </article>
        </section>

        <section class="content-layout">
          <section class="panel calendar-panel" id="calendarPanel">
            <div class="panel-header">
              <div>
                <p class="section-kicker">Calendar</p>
                <h3>日历</h3>
              </div>
              <div class="calendar-controls">
                <button class="icon-button" id="prevMonthBtn" type="button" title="上个月">‹</button>
                <select id="monthSelect" aria-label="月份"></select>
                <button class="icon-button" id="nextMonthBtn" type="button" title="下个月">›</button>
              </div>
            </div>
            <div class="calendar" id="calendar"></div>
            <div class="day-agenda" id="dayAgenda"></div>
          </section>

          <div class="main-column">
            <section class="panel" id="bookmarkPanel">
              <div class="panel-header">
                <div>
                  <p class="section-kicker">Links</p>
                  <h3>网页与文件夹书签</h3>
                </div>
                <div class="workflow-actions">
                  <button class="icon-button" id="editBookmarkBtn" type="button" title="编辑书签">✎</button>
                  <button class="icon-button" id="addBookmarkBtn" type="button" title="添加书签">+</button>
                </div>
              </div>
              <div class="bookmark-columns" id="bookmarkGrid"></div>
            </section>

            <section class="panel" id="projectPanel">
              <div class="panel-header">
                <div>
                  <p class="section-kicker" id="projectKicker">Projects</p>
                  <h3 id="projectPanelTitle">项目列表</h3>
                </div>
                <button class="icon-button" id="addProjectBtn" type="button" title="添加项目">+</button>
              </div>
              <div class="project-list" id="projectList"></div>
            </section>

            <section class="panel" id="workflowPanel">
              <div class="panel-header">
                <div>
                  <p class="section-kicker">Workflow</p>
                  <h3 id="workflowTitle">项目工作</h3>
                </div>
              </div>
              <div class="workflow-layout">
                <div class="kanban-area">
                  <div class="kanban-toolbar">
                    <strong id="currentProjectName">未选择项目</strong>
                    <span class="workflow-actions">
                      <button class="icon-button" id="editProjectBtn" type="button" title="修改项目">✎</button>
                      <button class="icon-button task-add-button" id="newTaskBtn" type="button" title="新建工作">+</button>
                    </span>
                  </div>
                  <div class="kanban" id="kanban"></div>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog id="taskDialog" class="dialog">
      <form method="dialog" id="taskForm">
        <header>
          <h3>新建工作</h3>
          <button type="button" class="icon-button" data-close-dialog>×</button>
        </header>
        <input name="spaceId" id="taskSpaceInput" type="hidden" />
        <input name="projectId" id="taskProjectInput" type="hidden" />
        <div class="form-context" id="taskContextText"></div>
        <label>
          工作名称
          <input name="title" required placeholder="填写日程" />
        </label>
        <label>
          地点
          <input name="location" placeholder="填写地点" />
        </label>
        <div class="form-row">
          <label>
            日期
            <input name="dueDate" type="date" required />
          </label>
          <label>
            开始时间
            <input name="startTime" type="time" />
          </label>
          <label>
            结束时间
            <input name="endTime" type="time" />
          </label>
        </div>
        <label>
          颜色
          <input name="color" id="taskColorInput" type="hidden" />
          <div class="color-palette" id="taskColorPalette" role="radiogroup" aria-label="工作颜色"></div>
        </label>
        <menu>
          <button type="button" class="ghost-button" data-close-dialog>取消</button>
          <button type="button" class="danger-button" id="deleteTaskBtn">删除</button>
          <button class="primary-button" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="bookmarkDialog" class="dialog">
      <form method="dialog" id="bookmarkForm">
        <header>
          <h3>添加书签</h3>
          <button type="button" class="icon-button" data-close-dialog>×</button>
        </header>
        <label>
          名称
          <input name="title" required placeholder="例如：Canvas 课程平台" />
        </label>
        <label>
          类型
          <select name="type">
            <option value="web">网页链接</option>
            <option value="folder">本地文件夹</option>
          </select>
        </label>
        <label>
          功能分区
          <select name="category">
            <option value="life">日常生活</option>
            <option value="student">学生工作</option>
            <option value="research">学习科研</option>
            <option value="practice">课外实践</option>
          </select>
        </label>
        <label>
          链接
          <input name="url" required placeholder="https://... 或 file:///D:/..." />
        </label>
        <menu>
          <button type="button" class="ghost-button" data-close-dialog>取消</button>
          <button class="primary-button" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="projectDialog" class="dialog">
      <form method="dialog" id="projectForm">
        <header>
          <h3>添加项目</h3>
          <button type="button" class="icon-button" data-close-dialog>×</button>
        </header>
        <label>
          项目名称
          <input name="name" required placeholder="填写项目" />
        </label>
        <label>
          图标
          <input name="icon" id="projectIconInput" type="hidden" />
          <div class="icon-palette" id="projectIconPalette" role="radiogroup" aria-label="项目图标"></div>
        </label>
        <menu class="split-menu">
          <span class="menu-left">
            <button type="button" class="danger-button" id="deleteProjectBtn">删除</button>
            <button type="button" class="status-button" id="toggleProjectCompleteBtn">已完成</button>
          </span>
          <span class="menu-right">
            <button type="button" class="ghost-button" data-close-dialog>取消</button>
            <button class="primary-button" type="submit">保存</button>
          </span>
        </menu>
      </form>
    </dialog>

    <dialog id="userDialog" class="dialog">
      <form method="dialog" id="userForm">
        <header>
          <h3>用户中心</h3>
          <button type="button" class="icon-button" data-close-dialog>×</button>
        </header>
        <section class="user-panel-section">
          <span class="note-label">账号</span>
          <p id="userAccountText">未登录</p>
        </section>
        <label>
          邮箱
          <input id="userEmail" type="email" placeholder="填写邮箱" autocomplete="email" />
        </label>
        <p class="mail-limit-note">邮箱验证邮件受 Supabase 限制，1 小时最多发送 2 封。</p>
        <div class="user-actions">
          <button class="ghost-button" id="sendChangePasswordBtn" type="button">发送修改密码邮件</button>
          <button class="ghost-button" id="sendForgotPasswordBtn" type="button">发送忘记密码邮件</button>
          <button class="primary-button" id="userExportBtn" type="button">导出 JSON</button>
        </div>
      </form>
    </dialog>

    <dialog id="confirmDialog" class="dialog confirm-dialog">
      <form method="dialog">
        <header>
          <h3 id="confirmTitle">确认操作</h3>
        </header>
        <p id="confirmMessage">确定继续吗？</p>
        <menu>
          <button type="button" class="ghost-button" id="confirmCancelBtn">取消</button>
          <button type="button" class="danger-button" id="confirmOkBtn">删除</button>
        </menu>
      </form>
    </dialog>

    <script src="./data/schedules.js"></script>
    <script src="./data/schedules.local.js" onerror="this.remove()"></script>
    <script src="./data/bookmarks.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
